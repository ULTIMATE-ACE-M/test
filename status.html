<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Status Dashboard</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;min-height:100vh;background:#0c0905;overflow-x:hidden}
    body::before{
      content:'';position:fixed;inset:0;z-index:0;
      background:
        radial-gradient(ellipse 80% 65% at 10% 5%,  rgba(255,100,15,0.55) 0%,transparent 52%),
        radial-gradient(ellipse 65% 75% at 85% 80%, rgba(255,165,45,0.3)  0%,transparent 52%),
        radial-gradient(ellipse 70% 55% at 50% 45%, rgba(200,55,0,0.2)    0%,transparent 65%);
      animation:bgpulse 14s ease-in-out infinite alternate;
    }
    @keyframes bgpulse{0%{opacity:1;transform:scale(1)}100%{opacity:.78;transform:scale(1.07)}}
    .nav{
      position:sticky;top:0;z-index:100;
      backdrop-filter:blur(32px) saturate(200%) brightness(1.06);
      -webkit-backdrop-filter:blur(32px) saturate(200%) brightness(1.06);
      background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,rgba(255,255,255,.05) 100%);
      border-bottom:1px solid rgba(255,255,255,.15);
      box-shadow:0 1px 0 rgba(255,255,255,.08);
    }
    .nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px;padding:0 2rem}
    .nav-brand{font-size:1.15rem;font-weight:800;letter-spacing:-.5px;text-decoration:none;background:linear-gradient(135deg,#fff 0%,#FFB07A 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nav-links{display:flex;gap:.25rem}
    .nav-link{padding:.38rem 1.05rem;border-radius:999px;text-decoration:none;color:rgba(255,255,255,.5);font-size:.875rem;font-weight:500;border:1px solid transparent;transition:all .2s}
    .nav-link:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.1)}
    .nav-link.active{color:#fff;background:rgba(255,120,30,.22);border-color:rgba(255,120,30,.45);box-shadow:0 2px 12px rgba(255,120,30,.2),inset 0 1px 0 rgba(255,255,255,.2)}
    .wrapper{position:relative;z-index:1;padding:2.5rem 1.5rem 3rem;max-width:1100px;margin:0 auto}
    header{text-align:center;margin-bottom:2.5rem}
    header h1{font-size:2.4rem;font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,#fff 0%,rgba(255,200,150,.9) 50%,rgba(255,120,30,.8) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    header p{color:rgba(255,255,255,.4);margin-top:.4rem;font-size:.95rem}
    .overall-pill{
      display:inline-flex;align-items:center;gap:.5rem;margin-top:1.1rem;
      padding:.45rem 1.2rem;border-radius:999px;font-size:.85rem;font-weight:600;
      backdrop-filter:blur(24px) saturate(200%);-webkit-backdrop-filter:blur(24px) saturate(200%);
      border:1px solid rgba(255,255,255,.2);
      background:linear-gradient(145deg,rgba(255,255,255,.14) 0%,rgba(255,255,255,.06) 100%);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.28);
      transition:all .4s;
    }
    .overall-pill.checking{color:rgba(255,255,255,.5)}
    .overall-pill.all-up{background:rgba(255,110,25,.18);color:#FFB07A;border-color:rgba(255,110,25,.4);box-shadow:0 0 20px rgba(255,110,25,.15),inset 0 1px 0 rgba(255,255,255,.2)}
    .overall-pill.some-down{background:rgba(251,80,80,.15);color:#FCA5A5;border-color:rgba(251,80,80,.35)}
    .overall-pill .dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0}
    .overall-pill.all-up .dot{animation:pulse-o 2s infinite}
    .overall-pill.some-down .dot{animation:pulse-r 2s infinite}
    @keyframes pulse-o{0%,100%{box-shadow:0 0 0 0 rgba(255,160,80,.55)}50%{box-shadow:0 0 0 6px rgba(255,160,80,0)}}
    @keyframes pulse-r{0%,100%{box-shadow:0 0 0 0 rgba(252,165,165,.5)}50%{box-shadow:0 0 0 5px rgba(252,165,165,0)}}
    .tab-bar{display:flex;justify-content:center;gap:.5rem;margin-bottom:2rem;flex-wrap:wrap}
    .tab-btn{
      padding:.5rem 1.3rem;border-radius:999px;font-size:.88rem;font-weight:600;cursor:pointer;
      backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
      background:linear-gradient(145deg,rgba(255,255,255,.1) 0%,rgba(255,255,255,.05) 100%);
      color:rgba(255,255,255,.45);
      border:1px solid rgba(255,255,255,.15);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.18);
      transition:all .25s cubic-bezier(.34,1.56,.64,1);
    }
    .tab-btn:hover{background:rgba(255,255,255,.14);color:rgba(255,255,255,.85);transform:scale(1.04)}
    .tab-btn.active{
      background:linear-gradient(145deg,rgba(255,120,30,.28) 0%,rgba(255,80,10,.15) 100%);
      color:#FFB07A;border-color:rgba(255,120,30,.5);
      box-shadow:0 2px 16px rgba(255,100,20,.2),inset 0 1px 0 rgba(255,255,255,.22);
      transform:scale(1.06);
    }
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
    .card{
      backdrop-filter:blur(40px) saturate(220%) brightness(1.08);
      -webkit-backdrop-filter:blur(40px) saturate(220%) brightness(1.08);
      background:linear-gradient(145deg,rgba(255,255,255,.18) 0%,rgba(255,255,255,.07) 55%,rgba(255,120,30,.04) 100%);
      border:1px solid rgba(255,255,255,.16);
      border-top:1.5px solid rgba(255,255,255,.42);
      border-left:1px solid rgba(255,255,255,.26);
      box-shadow:0 8px 40px rgba(0,0,0,.35),0 2px 8px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.3);
      border-radius:20px;padding:1.3rem 1.5rem;display:flex;flex-direction:column;gap:.9rem;
      transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s,border-color .3s;
      position:relative;overflow:hidden;
    }
    .card::before{content:'';position:absolute;inset:0;pointer-events:none;border-radius:inherit;background:linear-gradient(145deg,rgba(255,255,255,.2) 0%,rgba(255,255,255,.04) 40%,transparent 65%)}
    .card:hover{transform:translateY(-3px) scale(1.01);box-shadow:0 16px 50px rgba(0,0,0,.4),0 4px 12px rgba(255,100,20,.12),inset 0 1px 0 rgba(255,255,255,.32)}
    .card.up{border-color:rgba(255,110,25,.38);box-shadow:0 8px 40px rgba(0,0,0,.3),0 0 0 1px rgba(255,110,25,.18) inset}
    .card.down{border-color:rgba(251,80,80,.35);box-shadow:0 8px 40px rgba(0,0,0,.3),0 0 0 1px rgba(251,80,80,.15) inset}
    .card.hidden{display:none}
    .card-top{display:flex;align-items:center;justify-content:space-between;gap:.8rem}
    .svc-info{min-width:0}
    .svc-name{font-size:1rem;font-weight:650;color:rgba(255,255,255,.92);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .svc-url{font-size:.72rem;color:rgba(255,255,255,.28);margin-top:.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .badge{
      display:inline-flex;align-items:center;gap:.35rem;padding:.28rem .75rem;border-radius:999px;
      font-size:.78rem;font-weight:700;flex-shrink:0;
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.15);
    }
    .badge.checking{background:rgba(255,255,255,.08);color:rgba(255,255,255,.38);border:1px solid rgba(255,255,255,.12)}
    .badge.up{background:rgba(255,110,25,.18);color:#FFB07A;border:1px solid rgba(255,110,25,.4)}
    .badge.down{background:rgba(251,80,80,.15);color:#FCA5A5;border:1px solid rgba(251,80,80,.35)}
    .badge .badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
    .badge.up .badge-dot{animation:pulse-o 2s infinite}
    .spinner{display:inline-block;width:8px;height:8px;border:1.5px solid rgba(255,255,255,.15);border-top-color:rgba(255,200,100,.7);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .card-meta{display:flex;justify-content:space-between;align-items:center;font-size:.72rem;color:rgba(255,255,255,.22);border-top:1px solid rgba(255,255,255,.07);padding-top:.7rem}
    .controls{text-align:center;margin-top:2rem}
    .refresh-btn{
      padding:.6rem 1.5rem;border-radius:999px;
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      background:linear-gradient(145deg,rgba(255,255,255,.12) 0%,rgba(255,255,255,.06) 100%);
      color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.18);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.22);
      font-size:.87rem;cursor:pointer;transition:all .2s;
    }
    .refresh-btn:hover{background:rgba(255,120,30,.2);color:#FFB07A;border-color:rgba(255,120,30,.4)}
    .refresh-btn:disabled{opacity:.4;cursor:not-allowed}
    .next-check{font-size:.78rem;color:rgba(255,255,255,.18);margin-top:.6rem}
    .footer-note{text-align:center;margin-top:3rem;font-size:.72rem;color:rgba(255,255,255,.12)}
  </style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">ACE-M</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="status.html" class="nav-link active">Status</a>
      <a href="about.html" class="nav-link">Over mij</a>
    </div>
  </div>
</nav>
<div class="wrapper">
  <header>
    <h1>Status Dashboard</h1>
    <p>Live status van applicaties</p>
    <div class="overall-pill checking" id="overall">
      <span class="dot"></span><span id="overall-text">Controleren...</span>
    </div>
  </header>
  <div class="tab-bar" id="tab-bar"></div>
  <div class="grid" id="grid"></div>
  <div class="controls">
    <button class="refresh-btn" id="refresh-btn" onclick="runChecks()">&#8635; Vernieuwen</button>
    <div class="next-check" id="next-check"></div>
  </div>
  <div class="footer-note">Statuschecks lopen direct in je browser</div>
</div>
<script>
  var TABS=[{id:'alle',label:'Alle'},{id:'werk',label:'Werk'},{id:'microsoft',label:'Microsoft'},{id:'infrastructuur',label:'Infrastructuur'}];
  var SERVICES=[
    {name:'AFAS',url:'https://www.afas.nl',tab:'werk'},
    {name:'Somtoday',url:'https://som.today',tab:'werk'},
    {name:'Presentis',url:'https://www.presentis.nl',tab:'werk'},
    {name:'De Meerwaarde',url:'https://www.demeerwaarde.nl',tab:'werk'},
    {name:'Microsoft 365',url:'https://www.office.com',tab:'microsoft'},
    {name:'Microsoft Teams',url:'https://teams.microsoft.com',tab:'microsoft'},
    {name:'Outlook',url:'https://outlook.office365.com',tab:'microsoft'},
    {name:'Azure Portal',url:'https://portal.azure.com',tab:'microsoft'},
    {name:'Microsoft',url:'https://www.microsoft.com',tab:'microsoft'},
    {name:'Cloudflare',url:'https://www.cloudflare.com',tab:'infrastructuur'},
    {name:'Cloudflare Status',url:'https://www.cloudflarestatus.com',tab:'infrastructuur'}
  ];
  var TIMEOUT_MS=8000,REFRESH_SEC=60,activeTab='alle';
  var states=SERVICES.map(function(){return{status:'checking',checkedAt:null};});
  var countdownTimer;
  var tabBar=document.getElementById('tab-bar');
  TABS.forEach(function(t){
    var btn=document.createElement('button');
    btn.className='tab-btn'+(t.id===activeTab?' active':'');
    btn.textContent=t.label;btn.onclick=function(){switchTab(t.id);};btn.id='tab-'+t.id;
    tabBar.appendChild(btn);
  });
  var grid=document.getElementById('grid');
  SERVICES.forEach(function(s,i){
    var card=document.createElement('div');card.className='card';card.id='card-'+i;card.dataset.tab=s.tab;
    var top=document.createElement('div');top.className='card-top';
    var info=document.createElement('div');info.className='svc-info';
    var nm=document.createElement('div');nm.className='svc-name';nm.textContent=s.name;
    var ur=document.createElement('div');ur.className='svc-url';ur.textContent=s.url.replace('https://','');
    info.appendChild(nm);info.appendChild(ur);
    var badge=document.createElement('div');badge.className='badge checking';badge.id='badge-'+i;
    var sp=document.createElement('span');sp.className='spinner';
    badge.appendChild(sp);badge.appendChild(document.createTextNode(' ...'));
    top.appendChild(info);top.appendChild(badge);
    var meta=document.createElement('div');meta.className='card-meta';
    var chk=document.createElement('span');chk.id='checked-'+i;chk.textContent='-';
    meta.appendChild(chk);card.appendChild(top);card.appendChild(meta);grid.appendChild(card);
  });
  function switchTab(tabId){
    activeTab=tabId;
    TABS.forEach(function(t){document.getElementById('tab-'+t.id).className='tab-btn'+(t.id===tabId?' active':'');});
    SERVICES.forEach(function(s,i){document.getElementById('card-'+i).classList.toggle('hidden',tabId!=='alle'&&s.tab!==tabId);});
    updateOverall();
  }
  function checkService(url){
    return new Promise(function(resolve){
      var c=new AbortController(),t=setTimeout(function(){c.abort();},TIMEOUT_MS);
      fetch(url,{mode:'no-cors',signal:c.signal}).then(function(){clearTimeout(t);resolve(true);}).catch(function(){clearTimeout(t);resolve(false);});
    });
  }
  function updateCard(i,status,checkedAt){
    var card=document.getElementById('card-'+i),badge=document.getElementById('badge-'+i),chkEl=document.getElementById('checked-'+i);
    card.className='card '+status+(activeTab!=='alle'&&SERVICES[i].tab!==activeTab?' hidden':'');
    badge.className='badge '+status;
    while(badge.firstChild){badge.removeChild(badge.firstChild);}
    var dot=document.createElement('span');dot.className='badge-dot';badge.appendChild(dot);
    badge.appendChild(document.createTextNode(' '+(status==='up'?'Up':'Down')));
    chkEl.textContent=checkedAt?checkedAt.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit',second:'2-digit'}):'-';
  }
  function updateOverall(){
    var overall=document.getElementById('overall'),txt=document.getElementById('overall-text');
    var vis=SERVICES.filter(function(s){return activeTab==='alle'||s.tab===activeTab;});
    var vs=vis.map(function(s){return states[SERVICES.indexOf(s)];});
    if(!vs.every(function(s){return s.status!=='checking';})){overall.className='overall-pill checking';txt.textContent='Controleren...';}
    else if(vs.some(function(s){return s.status==='down';})){overall.className='overall-pill some-down';txt.textContent=vs.filter(function(s){return s.status==='down';}).length+' niet bereikbaar';}
    else{overall.className='overall-pill all-up';txt.textContent='Alles operationeel';}
  }
  function runChecks(){
    clearInterval(countdownTimer);
    document.getElementById('refresh-btn').disabled=true;
    document.getElementById('next-check').textContent='';
    states=SERVICES.map(function(){return{status:'checking',checkedAt:null};});
    SERVICES.forEach(function(s,i){
      var card=document.getElementById('card-'+i),badge=document.getElementById('badge-'+i);
      card.className='card'+(activeTab!=='alle'&&s.tab!==activeTab?' hidden':'');
      badge.className='badge checking';
      while(badge.firstChild){badge.removeChild(badge.firstChild);}
      var sp=document.createElement('span');sp.className='spinner';
      badge.appendChild(sp);badge.appendChild(document.createTextNode(' ...'));
      document.getElementById('checked-'+i).textContent='-';
    });
    updateOverall();
    Promise.all(SERVICES.map(function(s,i){
      return checkService(s.url).then(function(up){
        var now=new Date();states[i]={status:up?'up':'down',checkedAt:now};
        updateCard(i,states[i].status,now);updateOverall();
      });
    })).then(function(){
      document.getElementById('refresh-btn').disabled=false;
      var sec=REFRESH_SEC;
      countdownTimer=setInterval(function(){
        sec--;document.getElementById('next-check').textContent='Automatisch vernieuwen over '+sec+'s';
        if(sec<=0){clearInterval(countdownTimer);runChecks();}
      },1000);
    });
  }
  runChecks();
</script>
</body>
</html>
