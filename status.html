<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Status - ACE-M</title>
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;min-height:100vh;background:#f0ebe3;color:#1a0f05;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 48% at 12% 10%,rgba(255,110,20,.62) 0%,transparent 52%),radial-gradient(ellipse 55% 50% at 88% 20%,rgba(255,80,0,.55) 0%,transparent 50%),radial-gradient(ellipse 70% 55% at 50% 85%,rgba(255,130,40,.50) 0%,transparent 55%)}
nav{position:sticky;top:0;z-index:100;backdrop-filter:blur(44px) saturate(250%) brightness(1.08);-webkit-backdrop-filter:blur(44px) saturate(250%) brightness(1.08);background:rgba(255,255,255,.28);border-bottom:1.5px solid rgba(255,255,255,.72);box-shadow:0 0 0 1px rgba(0,0,0,.06),0 2px 16px rgba(0,0,0,.08)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px;padding:0 2rem}
.nav-brand{font-size:1.15rem;font-weight:800;letter-spacing:-.5px;text-decoration:none;background:linear-gradient(135deg,#1a0f05 0%,#FF6B1A 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:.25rem}
.nav-link{font-size:.88rem;font-weight:500;text-decoration:none;color:rgba(26,15,5,.7);padding:.38rem .95rem;border-radius:20px;border:1.5px solid transparent;transition:all .22s ease;position:relative;overflow:hidden}
.nav-link::after{content:'';position:absolute;inset:0;background:linear-gradient(130deg,rgba(255,255,255,0) 20%,rgba(255,255,255,.55) 50%,rgba(255,255,255,0) 80%);transform:translateX(-160%);transition:transform .4s ease;pointer-events:none;border-radius:inherit}
.nav-link:hover{background:rgba(255,255,255,.45);color:#1a0f05;border-color:rgba(255,255,255,.88);box-shadow:0 0 0 1.5px rgba(0,0,0,.08),0 3px 10px rgba(0,0,0,.1),inset 0 1px 0 rgba(255,255,255,.92)}
.nav-link:hover::after{transform:translateX(160%)}
.nav-link.active{background:linear-gradient(180deg,rgba(255,255,255,.72) 0%,rgba(255,255,255,.32) 100%);color:#FF6B1A;font-weight:600;border-color:rgba(255,255,255,.9);box-shadow:0 0 0 1.5px rgba(0,0,0,.09),0 4px 18px rgba(0,0,0,.1),inset 0 1.5px 0 rgba(255,255,255,.98)}
.page{position:relative;z-index:1;padding:3rem 2rem 6rem;max-width:1100px;margin:0 auto}
.page-header{text-align:center;margin-bottom:2rem}
.page-title{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;letter-spacing:-.03em;color:#1a0f05;margin-bottom:.75rem}
.page-sub{font-size:.95rem;color:rgba(26,15,5,.55)}
.overall{display:flex;justify-content:center;margin-bottom:2.5rem}
.overall-pill{display:inline-flex;align-items:center;gap:.55rem;font-size:.88rem;font-weight:600;padding:.5rem 1.4rem;border-radius:24px;position:relative;overflow:hidden;transition:all .25s ease}
.overall-pill::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.55) 0%,rgba(255,255,255,0) 100%);pointer-events:none;border-radius:inherit}
.overall-pill.all-up{color:#2d7a3a;background:linear-gradient(180deg,rgba(220,255,230,.72) 0%,rgba(180,240,195,.35) 100%);border:1.5px solid rgba(255,255,255,.88);border-bottom-color:rgba(180,240,195,.5);box-shadow:0 0 0 1.5px rgba(0,0,0,.07),0 4px 16px rgba(50,180,80,.18),inset 0 1.5px 0 rgba(255,255,255,.95)}
.overall-pill.has-down{color:#8a3a00;background:linear-gradient(180deg,rgba(255,230,210,.72) 0%,rgba(255,200,160,.35) 100%);border:1.5px solid rgba(255,255,255,.88);border-bottom-color:rgba(255,180,100,.5);box-shadow:0 0 0 1.5px rgba(0,0,0,.07),0 4px 16px rgba(217,58,58,.18),inset 0 1.5px 0 rgba(255,255,255,.95)}
.dot{width:9px;height:9px;border-radius:50%;background:currentColor;flex-shrink:0}
.overall-pill.all-up .dot{animation:pulse-o 2s ease-in-out infinite}
@keyframes pulse-o{0%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}100%{opacity:1;transform:scale(1)}}
/* ── CHROME GLASS TABS ── */
.tabs{display:flex;gap:.45rem;justify-content:center;margin-bottom:2.5rem;flex-wrap:wrap}
.tab-btn{font-size:.88rem;font-weight:500;padding:.5rem 1.3rem;border-radius:50px;border:1.5px solid rgba(255,255,255,.88);border-bottom-color:rgba(255,255,255,.45);background:linear-gradient(180deg,rgba(255,255,255,.68) 0%,rgba(255,255,255,.25) 100%);backdrop-filter:blur(28px) saturate(240%);-webkit-backdrop-filter:blur(28px) saturate(240%);color:#1a0f05;cursor:pointer;box-shadow:0 0 0 1.5px rgba(0,0,0,.08),0 4px 14px rgba(0,0,0,.1),inset 0 1.5px 0 rgba(255,255,255,.98);transition:all .22s ease;position:relative;overflow:hidden}
.tab-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.55) 0%,rgba(255,255,255,0) 100%);pointer-events:none;border-radius:inherit}
.tab-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(130deg,rgba(255,255,255,0) 20%,rgba(255,255,255,.6) 50%,rgba(255,255,255,0) 80%);transform:translateX(-160%);transition:transform .4s ease;pointer-events:none;border-radius:inherit}
.tab-btn:hover{background:linear-gradient(180deg,rgba(255,255,255,.88) 0%,rgba(255,255,255,.48) 100%);box-shadow:0 0 0 1.5px rgba(0,0,0,.1),0 8px 22px rgba(0,0,0,.14),inset 0 1.5px 0 rgba(255,255,255,1);transform:translateY(-1px)}
.tab-btn:hover::after{transform:translateX(160%)}
.tab-btn.active{background:linear-gradient(180deg,rgba(255,140,40,.28) 0%,rgba(255,88,10,.14) 100%);color:#FF6B1A;border-color:rgba(255,255,255,.85);border-bottom-color:rgba(255,107,26,.3);font-weight:600;box-shadow:0 0 0 1.5px rgba(0,0,0,.09),0 4px 18px rgba(255,107,26,.2),inset 0 1.5px 0 rgba(255,210,140,.6)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.2rem}
/* ── CHROME GLASS SERVICE CARDS ── */
.service-card{background:linear-gradient(160deg,rgba(255,255,255,.55) 0%,rgba(255,255,255,.22) 100%);backdrop-filter:blur(60px) saturate(260%) brightness(1.08);-webkit-backdrop-filter:blur(60px) saturate(260%) brightness(1.08);border:1.5px solid rgba(255,255,255,.88);border-bottom-color:rgba(255,255,255,.42);box-shadow:0 0 0 1.5px rgba(0,0,0,.07),0 8px 32px rgba(0,0,0,.1),inset 0 1.5px 0 rgba(255,255,255,.98);border-radius:18px;padding:1.2rem 1.4rem;display:flex;align-items:center;gap:1rem;transition:all .28s ease;position:relative;overflow:hidden}
.service-card::before{content:'';position:absolute;top:0;left:0;right:0;height:48%;background:linear-gradient(180deg,rgba(255,255,255,.55) 0%,rgba(255,255,255,0) 100%);pointer-events:none;border-radius:inherit}
.service-card::after{content:'';position:absolute;inset:0;background:linear-gradient(130deg,rgba(255,255,255,0) 20%,rgba(255,255,255,.55) 50%,rgba(255,255,255,0) 80%);transform:translateX(-160%);transition:transform .5s ease;pointer-events:none;border-radius:inherit}
.service-card:hover{transform:translateY(-3px);box-shadow:0 0 0 1.5px rgba(0,0,0,.09),0 14px 40px rgba(0,0,0,.14),inset 0 1.5px 0 rgba(255,255,255,1)}
.service-card:hover::after{transform:translateX(160%)}
.service-info{flex:1;min-width:0;position:relative;z-index:1}
.service-name{font-size:.92rem;font-weight:600;color:#1a0f05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.service-url{font-size:.75rem;color:rgba(26,15,5,.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
/* ── CHROME GLASS BADGE ── */
.status-badge{display:inline-flex;align-items:center;gap:.35rem;font-size:.75rem;font-weight:600;padding:.3rem .75rem;border-radius:50px;white-space:nowrap;position:relative;overflow:hidden;flex-shrink:0}
.status-badge::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.45) 0%,rgba(255,255,255,0) 100%);pointer-events:none;border-radius:inherit}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge-checking{color:rgba(26,15,5,.55);background:linear-gradient(180deg,rgba(255,255,255,.68) 0%,rgba(255,255,255,.28) 100%);border:1.5px solid rgba(255,255,255,.88);border-bottom-color:rgba(255,255,255,.45);box-shadow:0 0 0 1.5px rgba(0,0,0,.07),inset 0 1px 0 rgba(255,255,255,.95)}
.badge-online{color:#2d7a3a;background:linear-gradient(180deg,rgba(220,255,228,.72) 0%,rgba(180,240,195,.35) 100%);border:1.5px solid rgba(255,255,255,.85);border-bottom-color:rgba(180,240,195,.5);box-shadow:0 0 0 1.5px rgba(0,0,0,.06),0 2px 8px rgba(50,180,80,.15),inset 0 1px 0 rgba(255,255,255,.9)}
.badge-offline{color:#c0392b;background:linear-gradient(180deg,rgba(255,220,215,.72) 0%,rgba(255,180,170,.35) 100%);border:1.5px solid rgba(255,255,255,.85);border-bottom-color:rgba(255,180,170,.5);box-shadow:0 0 0 1.5px rgba(0,0,0,.06),0 2px 8px rgba(192,57,43,.15),inset 0 1px 0 rgba(255,255,255,.9)}
.timestamp{text-align:center;margin-top:2rem;font-size:.8rem;color:rgba(26,15,5,.45)}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">ACE-M</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="status.html" class="nav-link active">Status</a>
      <a href="about.html" class="nav-link">About me</a>
    </div>
  </div>
</nav>
<div class="page">
  <div class="page-header">
    <h1 class="page-title">Status Dashboard</h1>
    <p class="page-sub">Live overview of all application statuses. Automatically updated every 60 seconds.</p>
  </div>
  <div class="overall"><div class="overall-pill all-up" id="overall-pill"><span class="dot"></span><span id="overall-text">Checking...</span></div></div>
  <div class="tabs">
    <button class="tab-btn active" onclick="filterCards('all',this)">All</button>
    <button class="tab-btn" onclick="filterCards('work',this)">Work</button>
    <button class="tab-btn" onclick="filterCards('microsoft',this)">Microsoft</button>
    <button class="tab-btn" onclick="filterCards('infra',this)">Infrastructure</button>
  </div>
  <div class="grid" id="grid"></div>
  <p class="timestamp" id="timestamp"></p>
</div>
<script>
var services=[
  {name:'AFAS',url:'https://online.afas.nl',cat:'work'},
  {name:'Somtoday',url:'https://som.today',cat:'work'},
  {name:'Presentis',url:'https://presentis.nl',cat:'work'},
  {name:'De Meerwaarde',url:'https://demeerwaarde.nl',cat:'work'},
  {name:'Microsoft 365',url:'https://www.office.com',cat:'microsoft'},
  {name:'Teams',url:'https://teams.microsoft.com',cat:'microsoft'},
  {name:'Outlook',url:'https://outlook.office365.com',cat:'microsoft'},
  {name:'Azure Portal',url:'https://portal.azure.com',cat:'microsoft'},
  {name:'Microsoft',url:'https://www.microsoft.com',cat:'microsoft'},
  {name:'Cloudflare',url:'https://dash.cloudflare.com',cat:'infra'},
  {name:'Cloudflare Status',url:'https://www.cloudflarestatus.com',cat:'infra'}
];
var cards={};
function buildCards(){
  var grid=document.getElementById('grid');
  services.forEach(function(s){
    var card=document.createElement('div');
    card.className='service-card';
    card.dataset.cat=s.cat;
    var info=document.createElement('div');
    info.className='service-info';
    var name=document.createElement('div');
    name.className='service-name';
    name.textContent=s.name;
    var urlEl=document.createElement('div');
    urlEl.className='service-url';
    urlEl.textContent=s.url.replace('https://','');
    info.appendChild(name);
    info.appendChild(urlEl);
    var badge=document.createElement('div');
    badge.className='status-badge badge-checking';
    var dot=document.createElement('span');
    dot.className='status-dot';
    var label=document.createElement('span');
    label.textContent='Checking';
    badge.appendChild(dot);
    badge.appendChild(label);
    card.appendChild(info);
    card.appendChild(badge);
    grid.appendChild(card);
    cards[s.url]={badge:badge,label:label};
  });
}
function checkService(s){
  var ctrl=new AbortController();
  var timer=setTimeout(function(){ctrl.abort()},8000);
  fetch(s.url,{mode:'no-cors',signal:ctrl.signal})
    .then(function(){clearTimeout(timer);var b=cards[s.url];b.badge.className='status-badge badge-online';b.label.textContent='Online';})
    .catch(function(){clearTimeout(timer);var b=cards[s.url];b.badge.className='status-badge badge-offline';b.label.textContent='Offline';});
}
function checkAll(){
  services.forEach(function(s){var b=cards[s.url];if(b){b.badge.className='status-badge badge-checking';b.label.textContent='Checking';}});
  services.forEach(checkService);
  setTimeout(updateOverall,9000);
  document.getElementById('timestamp').textContent='Last checked: '+new Date().toLocaleTimeString('en-GB');
}
function updateOverall(){
  var offline=0;
  services.forEach(function(s){var b=cards[s.url];if(b&&b.label.textContent==='Offline')offline++;});
  var pill=document.getElementById('overall-pill');
  var txt=document.getElementById('overall-text');
  if(offline===0){pill.className='overall-pill all-up';txt.textContent='All systems operational';}
  else{pill.className='overall-pill has-down';txt.textContent=offline+' service'+(offline>1?'s':'')+' offline';}
}
function filterCards(cat,btn){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  document.querySelectorAll('.service-card').forEach(function(c){c.style.display=(cat==='all'||c.dataset.cat===cat)?'':'none';});
}
buildCards();
checkAll();
setInterval(checkAll,60000);
</script>
</body>
</html>
