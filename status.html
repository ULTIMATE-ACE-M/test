<!DOCTYPE html>
<html lang="nl">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Status - ACE-M</title>
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;min-height:100vh;background:#f8f4ee;color:#1a0f05;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 70% 55% at 15% 10%,rgba(255,120,30,.38) 0%,transparent 55%),radial-gradient(ellipse 55% 65% at 85% 75%,rgba(255,170,60,.28) 0%,transparent 55%),radial-gradient(ellipse 50% 45% at 55% 40%,rgba(255,80,10,.14) 0%,transparent 60%);animation:bgpulse 14s ease-in-out infinite alternate}
@keyframes bgpulse{0%{opacity:1;transform:scale(1)}100%{opacity:.82;transform:scale(1.06)}}
nav{position:sticky;top:0;z-index:100;backdrop-filter:blur(32px) saturate(200%) brightness(1.04);-webkit-backdrop-filter:blur(32px) saturate(200%) brightness(1.04);background:rgba(255,255,255,.65);border-bottom:1px solid rgba(255,255,255,.7);box-shadow:0 1px 0 rgba(255,255,255,.8),0 4px 24px rgba(0,0,0,.06)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px;padding:0 2rem}
.nav-brand{font-size:1.15rem;font-weight:800;letter-spacing:-.5px;text-decoration:none;background:linear-gradient(135deg,#1a0f05 0%,#FF6B1A 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:.25rem}
.nav-link{font-size:.88rem;font-weight:500;text-decoration:none;color:rgba(26,15,5,.7);padding:.4rem .9rem;border-radius:20px;border:1px solid transparent;transition:all .22s ease}
.nav-link:hover{background:rgba(255,107,26,.12);color:#FF6B1A;border-color:rgba(255,107,26,.2)}
.nav-link.active{background:rgba(255,107,26,.16);color:#FF6B1A;border-color:rgba(255,107,26,.3);font-weight:600}
.page{position:relative;z-index:1;padding:3rem 2rem 6rem;max-width:1100px;margin:0 auto}
.page-header{text-align:center;margin-bottom:3rem}
.page-title{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;letter-spacing:-.03em;background:linear-gradient(145deg,#1a0f05 0%,#FF6B1A 55%,#FF9240 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.75rem}
.page-sub{font-size:.95rem;color:rgba(26,15,5,.5)}
.overall{display:flex;justify-content:center;margin-bottom:2rem}
.overall-pill{display:inline-flex;align-items:center;gap:.55rem;font-size:.88rem;font-weight:600;padding:.5rem 1.2rem;border-radius:24px;background:rgba(255,255,255,.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.8);border-top-color:rgba(255,255,255,.95);box-shadow:0 4px 16px rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.9);color:rgba(26,15,5,.55);transition:all .4s ease}
.overall-pill.all-up{color:#FF6B1A;border-color:rgba(255,107,26,.3);box-shadow:0 4px 20px rgba(255,107,26,.18),inset 0 1px 0 rgba(255,255,255,.9)}
.overall-pill.has-down{color:#d93a3a;border-color:rgba(217,58,58,.3);box-shadow:0 4px 20px rgba(217,58,58,.15),inset 0 1px 0 rgba(255,255,255,.9)}
.dot{width:9px;height:9px;border-radius:50%;background:currentColor;flex-shrink:0}
.overall-pill.all-up .dot{animation:pulse-o 2s ease-in-out infinite}
@keyframes pulse-o{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.tabs{display:flex;gap:.4rem;justify-content:center;margin-bottom:2.5rem;flex-wrap:wrap}
.tab-btn{font-size:.88rem;font-weight:500;padding:.45rem 1.1rem;border-radius:20px;border:1px solid rgba(255,255,255,.6);background:rgba(255,255,255,.45);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:rgba(26,15,5,.6);cursor:pointer;transition:all .22s ease;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.tab-btn:hover{background:rgba(255,255,255,.65);color:#1a0f05;box-shadow:0 4px 14px rgba(0,0,0,.07)}
.tab-btn.active{background:linear-gradient(145deg,rgba(255,120,30,.22) 0%,rgba(255,80,10,.12) 100%);color:#FF6B1A;border-color:rgba(255,107,26,.35);font-weight:600;box-shadow:0 4px 16px rgba(255,107,26,.14)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.2rem}
.service-card{background:rgba(255,255,255,.52);backdrop-filter:blur(40px) saturate(200%) brightness(1.06);-webkit-backdrop-filter:blur(40px) saturate(200%) brightness(1.06);border:1px solid rgba(255,255,255,.72);border-top-color:rgba(255,255,255,.92);border-left-color:rgba(255,255,255,.82);border-radius:20px;padding:1.5rem 1.6rem;position:relative;overflow:hidden;transition:all .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 6px 24px rgba(0,0,0,.07),inset 0 1px 0 rgba(255,255,255,.85)}
.service-card::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.35) 0%,transparent 100%);pointer-events:none}
.service-card::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.52) 50%,rgba(255,255,255,0) 100%);transform:translateX(-150%);transition:transform .5s ease;pointer-events:none}
.service-card:hover::after{transform:translateX(150%)}
.service-card:hover{background:rgba(255,255,255,.72);transform:translateY(-4px) scale(1.01);box-shadow:0 16px 40px rgba(255,100,20,.15),0 4px 16px rgba(0,0,0,.05),inset 0 1px 0 rgba(255,255,255,1)}
.service-card.hidden{display:none}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;position:relative;z-index:1}
.card-name{font-size:1rem;font-weight:700;color:#1a0f05}
.badge{font-size:.75rem;font-weight:600;padding:.28rem .7rem;border-radius:12px;letter-spacing:.02em;white-space:nowrap}
.badge-checking{background:rgba(26,15,5,.06);color:rgba(26,15,5,.4);border:1px solid rgba(26,15,5,.1)}
.badge-up{background:rgba(255,107,26,.14);color:#FF6B1A;border:1px solid rgba(255,107,26,.22)}
.badge-down{background:rgba(217,58,58,.1);color:#d93a3a;border:1px solid rgba(217,58,58,.2)}
.card-url{font-size:.78rem;color:rgba(26,15,5,.38);position:relative;z-index:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spinner{display:inline-block;width:10px;height:10px;border:2px solid rgba(26,15,5,.12);border-top-color:rgba(255,107,26,.65);border-radius:50%;animation:spin .7s linear infinite;margin-right:4px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
footer{border-top:1px solid rgba(255,255,255,.6);background:rgba(255,255,255,.4);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.footer-inner{max-width:1100px;margin:0 auto;padding:2.5rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1.2rem}
footer p{font-size:.82rem;color:rgba(26,15,5,.45)}
.socials{display:flex;gap:.75rem}
.social-link{width:42px;height:42px;border-radius:14px;background:rgba(255,255,255,.55);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.75);border-top-color:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;color:rgba(26,15,5,.6);text-decoration:none;transition:all .25s ease;box-shadow:0 2px 10px rgba(0,0,0,.05),inset 0 1px 0 rgba(255,255,255,.85);position:relative;overflow:hidden}
.social-link::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.55) 50%,rgba(255,255,255,0) 100%);transform:translateX(-150%);transition:transform .4s ease;pointer-events:none}
.social-link:hover::after{transform:translateX(150%)}
.social-link:hover{background:rgba(255,107,26,.18);color:#FF6B1A;border-color:rgba(255,107,26,.3);box-shadow:0 6px 20px rgba(255,107,26,.2),inset 0 1px 0 rgba(255,255,255,.9);transform:translateY(-3px)}
.social-link svg{width:18px;height:18px;flex-shrink:0;position:relative;z-index:1}
</style>
</head>

    <div class="nav-links">

<script>
var SERVICES = [
  {name:'AFAS',url:'https://www.afas.nl',tab:'werk'},
  {name:'Somtoday',url:'https://som.today',tab:'werk'},
  {name:'Presentis',url:'https://presentis.nl',tab:'werk'},
  {name:'De Meerwaarde',url:'https://demeerwaarde.nl',tab:'werk'},
  {name:'Microsoft 365',url:'https://www.office.com',tab:'microsoft'},
  {name:'Microsoft Teams',url:'https://teams.microsoft.com',tab:'microsoft'},
  {name:'Outlook',url:'https://outlook.office.com',tab:'microsoft'},
  {name:'Azure Portal',url:'https://portal.azure.com',tab:'microsoft'},
  {name:'Microsoft',url:'https://www.microsoft.com',tab:'microsoft'},
  {name:'Cloudflare',url:'https://www.cloudflare.com',tab:'infra'},
  {name:'Cloudflare Status',url:'https://www.cloudflarestatus.com',tab:'infra'}
];
var statusMap = {};
var currentTab = 'alle';

function switchTab(tab) {
  currentTab = tab;
  var btns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].dataset.tab === tab);
  }
  var cards = document.querySelectorAll('.service-card');
  for (var j = 0; j < cards.length; j++) {
    var c = cards[j];
    if (tab === 'alle' || c.dataset.tab === tab) {
      c.classList.remove('hidden');
    } else {
      c.classList.add('hidden');
    }
  }
}

function buildCard(svc) {
  var card = document.createElement('div');
  card.className = 'service-card';
  card.dataset.tab = svc.tab;
  card.dataset.name = svc.name;
  var top = document.createElement('div');
  top.className = 'card-top';
  var name = document.createElement('div');
  name.className = 'card-name';
  name.textContent = svc.name;
  var badge = document.createElement('div');
  badge.className = 'badge badge-checking';
  var spin = document.createElement('span');
  spin.className = 'spinner';
  badge.appendChild(spin);
  badge.appendChild(document.createTextNode('Controleren'));
  top.appendChild(name);
  top.appendChild(badge);
  var urlEl = document.createElement('div');
  urlEl.className = 'card-url';
  urlEl.textContent = svc.url.replace('https://', '');
  card.appendChild(top);
  card.appendChild(urlEl);
  return card;
}

function updateBadge(cardEl, status) {
  var badge = cardEl.querySelector('.badge');
  badge.className = 'badge';
  badge.innerHTML = '';
  if (status === 'up') {
    badge.classList.add('badge-up');
    badge.textContent = 'Online';
  } else {
    badge.classList.add('badge-down');
    badge.textContent = 'Offline';
  }
}

function checkService(svc, cardEl) {
  var ctrl = new AbortController();
  var timer = setTimeout(function() { ctrl.abort(); }, 8000);
  fetch(svc.url, {mode:'no-cors', signal:ctrl.signal})
    .then(function() {
      clearTimeout(timer);
      statusMap[svc.name] = 'up';
      updateBadge(cardEl, 'up');
      updateOverall();
    })
    .catch(function() {
      clearTimeout(timer);
      statusMap[svc.name] = 'down';
      updateBadge(cardEl, 'down');
      updateOverall();
    });
}

function updateOverall() {
  var total = SERVICES.length;
  var done = Object.keys(statusMap).length;
  var downs = 0;
  for (var k in statusMap) {
    if (statusMap[k] === 'down') downs++;
  }
  var pill = document.getElementById('overall-pill');
  var text = document.getElementById('overall-text');
  if (done < total) {
    pill.className = 'overall-pill';
    text.textContent = 'Controleren (' + done + '/' + total + ')';
  } else if (downs === 0) {
    pill.className = 'overall-pill all-up';
    text.textContent = 'Alle systemen operationeel';
  } else {
    pill.className = 'overall-pill has-down';
    text.textContent = downs + ' service' + (downs > 1 ? 's' : '') + ' offline';
  }
  var now = new Date();
  document.getElementById('last-update').textContent = 'Laatste controle: ' + now.toLocaleTimeString('nl-NL');
}

function init() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  statusMap = {};
  for (var i = 0; i < SERVICES.length; i++) {
    var svc = SERVICES[i];
    var card = buildCard(svc);
    grid.appendChild(card);
    checkService(svc, card);
  }
  if (currentTab !== 'alle') switchTab(currentTab);
}
init();
setInterval(init, 60000);
</script>
