<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: #0a0a1a;
      overflow-x: hidden;
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(120,80,255,0.35) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(0,180,255,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 50% 50%, rgba(255,60,160,0.15) 0%, transparent 70%);
      z-index: 0;
      animation: bgShift 12s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0%   { opacity: 1; transform: scale(1) rotate(0deg); }
      100% { opacity: 0.8; transform: scale(1.08) rotate(2deg); }
    }

    /* Glass orbs decoration */
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(100,120,255,0.12) 0%, transparent 70%);
      top: -100px; right: -100px;
      z-index: 0;
      animation: float 8s ease-in-out infinite;
    }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(30px); } }

    .wrapper {
      position: relative;
      z-index: 1;
      padding: 2.5rem 1.5rem 3rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 2.5rem; }

    header h1 {
      font-size: 2.4rem; font-weight: 700; letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.6) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p { color: rgba(255,255,255,0.45); margin-top: 0.4rem; font-size: 0.95rem; }

    /* Overall pill */
    .overall-pill {
      display: inline-flex; align-items: center; gap: 0.5rem;
      margin-top: 1.1rem; padding: 0.45rem 1.2rem;
      border-radius: 999px; font-size: 0.85rem; font-weight: 600;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.18);
      transition: background .4s, color .4s;
    }
    .overall-pill.checking  { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.55); }
    .overall-pill.all-up    { background: rgba(52,211,153,0.15);  color: #6ee7b7; border-color: rgba(52,211,153,0.3); }
    .overall-pill.some-down { background: rgba(251,113,133,0.15); color: #fca5a5; border-color: rgba(251,113,133,0.3); }
    .overall-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .overall-pill.all-up .dot    { animation: pulse-g 2s infinite; }
    .overall-pill.some-down .dot { animation: pulse-r 2s infinite; }
    @keyframes pulse-g { 0%,100%{box-shadow:0 0 0 0 rgba(110,231,183,.5)}50%{box-shadow:0 0 0 5px rgba(110,231,183,0)} }
    @keyframes pulse-r { 0%,100%{box-shadow:0 0 0 0 rgba(252,165,165,.5)}50%{box-shadow:0 0 0 5px rgba(252,165,165,0)} }

    /* ── Tabs ── */
    .tab-bar {
      display: flex; justify-content: center; gap: 0.5rem;
      margin-bottom: 2rem; flex-wrap: wrap;
    }
    .tab-btn {
      padding: 0.5rem 1.3rem; border-radius: 999px; border: none;
      font-size: 0.88rem; font-weight: 600; cursor: pointer;
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.12);
      transition: all .25s cubic-bezier(.34,1.56,.64,1);
      letter-spacing: 0.01em;
    }
    .tab-btn:hover { background: rgba(255,255,255,0.13); color: rgba(255,255,255,0.85); transform: scale(1.05); }
    .tab-btn.active {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border-color: rgba(255,255,255,0.35);
      box-shadow: 0 2px 20px rgba(255,255,255,0.08), inset 0 1px 0 rgba(255,255,255,0.25);
      transform: scale(1.06);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    /* ── Card — Liquid Glass ── */
    .card {
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 20px;
      padding: 1.3rem 1.5rem;
      display: flex; flex-direction: column; gap: 0.9rem;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), box-shadow .3s, border-color .3s, opacity .3s;
      position: relative; overflow: hidden;
    }
    /* inner glass sheen */
    .card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 60%);
      border-radius: inherit; pointer-events: none;
    }
    .card:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 12px 40px rgba(0,0,0,0.35); }
    .card.up   { border-color: rgba(52,211,153,0.3);  box-shadow: 0 0 0 1px rgba(52,211,153,0.12) inset; }
    .card.down { border-color: rgba(251,113,133,0.3); box-shadow: 0 0 0 1px rgba(251,113,133,0.12) inset; }
    .card.hidden { display: none; }

    .card-top { display: flex; align-items: center; justify-content: space-between; gap: 0.8rem; }

    .svc-info { min-width: 0; }
    .svc-name {
      font-size: 1rem; font-weight: 650; color: rgba(255,255,255,0.9);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .svc-url {
      font-size: 0.72rem; color: rgba(255,255,255,0.3);
      margin-top: 0.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Badge */
    .badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      padding: 0.28rem 0.75rem; border-radius: 999px;
      font-size: 0.78rem; font-weight: 700; flex-shrink: 0;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .badge.checking { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.1); }
    .badge.up       { background: rgba(52,211,153,0.15);  color: #6ee7b7; border: 1px solid rgba(52,211,153,0.3); }
    .badge.down     { background: rgba(251,113,133,0.15); color: #fca5a5; border: 1px solid rgba(251,113,133,0.3); }
    .badge .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .badge.up .badge-dot { animation: pulse-g 2s infinite; }

    /* Spinner */
    .spinner {
      display: inline-block; width: 8px; height: 8px;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.5);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Card meta */
    .card-meta {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.72rem; color: rgba(255,255,255,0.25);
      border-top: 1px solid rgba(255,255,255,0.07); padding-top: 0.7rem;
    }
    .http-code { color: rgba(255,255,255,0.35); font-weight: 600; }

    /* Controls */
    .controls { text-align: center; margin-top: 2rem; }
    .refresh-btn {
      padding: 0.6rem 1.5rem; border-radius: 999px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 0.87rem; cursor: pointer;
      transition: all .2s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .next-check { font-size: 0.78rem; color: rgba(255,255,255,0.2); margin-top: 0.6rem; }

    .footer { text-align: center; margin-top: 3rem; font-size: 0.72rem; color: rgba(255,255,255,0.15); }
  </style>
</head>
<body>
<div class="wrapper">
  <header>
    <h1>Status Dashboard</h1>
    <p>Live status van applicaties</p>
    <div class="overall-pill checking" id="overall">
      <span class="dot"></span>
      <span id="overall-text">Controleren...</span>
    </div>
  </header>

  <div class="tab-bar" id="tab-bar"></div>
  <div class="grid" id="grid"></div>

  <div class="controls">
    <button class="refresh-btn" id="refresh-btn" onclick="runChecks()">&#8635; Vernieuwen</button>
    <div class="next-check" id="next-check"></div>
  </div>
  <div class="footer">Statuschecks lopen direct in je browser</div>
</div>

<script>
  var TABS = [
    { id: 'alle',          label: 'Alle' },
    { id: 'werk',          label: 'Werk' },
    { id: 'microsoft',     label: 'Microsoft' },
    { id: 'infrastructuur',label: 'Infrastructuur' }
  ];

  var SERVICES = [
    { name: 'AFAS',              url: 'https://www.afas.nl',                      tab: 'werk' },
    { name: 'Somtoday',          url: 'https://som.today',                         tab: 'werk' },
    { name: 'Presentis',         url: 'https://www.presentis.nl',                 tab: 'werk' },
    { name: 'De Meerwaarde',     url: 'https://www.demeerwaarde.nl',              tab: 'werk' },
    { name: 'Microsoft 365',     url: 'https://www.office.com',                   tab: 'microsoft' },
    { name: 'Microsoft Teams',   url: 'https://teams.microsoft.com',              tab: 'microsoft' },
    { name: 'Outlook',           url: 'https://outlook.office365.com',            tab: 'microsoft' },
    { name: 'Azure Portal',      url: 'https://portal.azure.com',                 tab: 'microsoft' },
    { name: 'Microsoft',         url: 'https://www.microsoft.com',                tab: 'microsoft' },
    { name: 'Cloudflare',        url: 'https://www.cloudflare.com',               tab: 'infrastructuur' },
    { name: 'Cloudflare Status', url: 'https://www.cloudflarestatus.com',         tab: 'infrastructuur' }
  ];

  var TIMEOUT_MS  = 8000;
  var REFRESH_SEC = 60;
  var activeTab   = 'alle';
  var states      = SERVICES.map(function() { return { status: 'checking', checkedAt: null }; });
  var countdownTimer;

  // Build tabs
  var tabBar = document.getElementById('tab-bar');
  TABS.forEach(function(t) {
    var btn = document.createElement('button');
    btn.className = 'tab-btn' + (t.id === activeTab ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = function() { switchTab(t.id); };
    btn.id = 'tab-' + t.id;
    tabBar.appendChild(btn);
  });

  // Build cards
  var grid = document.getElementById('grid');
  SERVICES.forEach(function(s, i) {
    var card = document.createElement('div');
    card.className = 'card';
    card.id = 'card-' + i;
    card.dataset.tab = s.tab;

    var top = document.createElement('div');
    top.className = 'card-top';

    var info = document.createElement('div');
    info.className = 'svc-info';

    var nm = document.createElement('div');
    nm.className = 'svc-name';
    nm.textContent = s.name;

    var ur = document.createElement('div');
    ur.className = 'svc-url';
    ur.textContent = s.url.replace('https://', '');

    info.appendChild(nm);
    info.appendChild(ur);

    var badge = document.createElement('div');
    badge.className = 'badge checking';
    badge.id = 'badge-' + i;
    var sp = document.createElement('span');
    sp.className = 'spinner';
    badge.appendChild(sp);
    badge.appendChild(document.createTextNode(' ...'));

    top.appendChild(info);
    top.appendChild(badge);

    var meta = document.createElement('div');
    meta.className = 'card-meta';

    var chk = document.createElement('span');
    chk.id = 'checked-' + i;
    chk.textContent = '-';

    var cod = document.createElement('span');
    cod.className = 'http-code';
    cod.id = 'code-' + i;

    meta.appendChild(chk);
    meta.appendChild(cod);

    card.appendChild(top);
    card.appendChild(meta);
    grid.appendChild(card);
  });

  function switchTab(tabId) {
    activeTab = tabId;
    TABS.forEach(function(t) {
      var btn = document.getElementById('tab-' + t.id);
      btn.className = 'tab-btn' + (t.id === tabId ? ' active' : '');
    });
    SERVICES.forEach(function(s, i) {
      var card = document.getElementById('card-' + i);
      var show = tabId === 'alle' || s.tab === tabId;
      card.classList.toggle('hidden', !show);
    });
    updateOverall();
  }

  function checkService(url) {
    return new Promise(function(resolve) {
      var controller = new AbortController();
      var timer = setTimeout(function() { controller.abort(); }, TIMEOUT_MS);
      fetch(url, { mode: 'no-cors', signal: controller.signal })
        .then(function() { clearTimeout(timer); resolve(true); })
        .catch(function() { clearTimeout(timer); resolve(false); });
    });
  }

  function updateCard(i, status, checkedAt) {
    var card    = document.getElementById('card-' + i);
    var badge   = document.getElementById('badge-' + i);
    var chkEl   = document.getElementById('checked-' + i);

    card.className  = 'card ' + status + (activeTab !== 'alle' && SERVICES[i].tab !== activeTab ? ' hidden' : '');
    badge.className = 'badge ' + status;

    while (badge.firstChild) { badge.removeChild(badge.firstChild); }
    var dot = document.createElement('span');
    dot.className = 'badge-dot';
    badge.appendChild(dot);
    badge.appendChild(document.createTextNode(' ' + (status === 'up' ? 'Up' : 'Down')));

    chkEl.textContent = checkedAt
      ? checkedAt.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
      : '-';
  }

  function updateOverall() {
    var overall = document.getElementById('overall');
    var txt     = document.getElementById('overall-text');
    var visible = SERVICES.filter(function(s, i) {
      return activeTab === 'alle' || s.tab === activeTab;
    });
    var visStates = visible.map(function(s) {
      return states[SERVICES.indexOf(s)];
    });

    var allDone = visStates.every(function(s) { return s.status !== 'checking'; });
    var anyDown = visStates.some(function(s)  { return s.status === 'down'; });
    var allUp   = visStates.every(function(s) { return s.status === 'up'; });

    if (!allDone) {
      overall.className = 'overall-pill checking';
      txt.textContent   = 'Controleren...';
    } else if (anyDown) {
      overall.className = 'overall-pill some-down';
      var n = visStates.filter(function(s) { return s.status === 'down'; }).length;
      txt.textContent   = n + ' service' + (n > 1 ? 's' : '') + ' niet bereikbaar';
    } else if (allUp) {
      overall.className = 'overall-pill all-up';
      txt.textContent   = 'Alles operationeel';
    }
  }

  function runChecks() {
    clearInterval(countdownTimer);
    document.getElementById('refresh-btn').disabled = true;
    document.getElementById('next-check').textContent = '';

    states = SERVICES.map(function() { return { status: 'checking', checkedAt: null }; });
    SERVICES.forEach(function(s, i) {
      var card  = document.getElementById('card-' + i);
      var badge = document.getElementById('badge-' + i);
      var show  = activeTab === 'alle' || s.tab === activeTab;
      card.className = 'card' + (show ? '' : ' hidden');
      badge.className = 'badge checking';
      while (badge.firstChild) { badge.removeChild(badge.firstChild); }
      var sp = document.createElement('span'); sp.className = 'spinner';
      badge.appendChild(sp);
      badge.appendChild(document.createTextNode(' ...'));
      document.getElementById('checked-' + i).textContent = '-';
    });
    updateOverall();

    var promises = SERVICES.map(function(s, i) {
      return checkService(s.url).then(function(up) {
        var now = new Date();
        states[i] = { status: up ? 'up' : 'down', checkedAt: now };
        updateCard(i, states[i].status, now);
        updateOverall();
      });
    });

    Promise.all(promises).then(function() {
      document.getElementById('refresh-btn').disabled = false;
      var sec = REFRESH_SEC;
      countdownTimer = setInterval(function() {
        sec--;
        document.getElementById('next-check').textContent = 'Automatisch vernieuwen over ' + sec + 's';
        if (sec <= 0) { clearInterval(countdownTimer); runChecks(); }
      }, 1000);
    });
  }

  runChecks();
</script>
</body>
</html>
