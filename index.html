<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem;
    }
    header { text-align: center; margin-bottom: 2.5rem; }
    header h1 { font-size: 2rem; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    header p { color: #6b7280; margin-top: 0.4rem; font-size: 0.95rem; }
    .overall-status {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1.2rem; border-radius: 999px;
      font-size: 0.9rem; font-weight: 600; margin-top: 1rem;
    }
    .overall-status.all-up    { background: #052e16; color: #4ade80; }
    .overall-status.some-down { background: #431407; color: #fb923c; }
    .overall-status.checking  { background: #1e293b; color: #94a3b8; }
    .overall-status .dot { width: 10px; height: 10px; border-radius: 50%; background: currentColor; }
    .overall-status.all-up .dot    { animation: pulse-green 2s infinite; }
    .overall-status.some-down .dot { animation: pulse-red 2s infinite; }
    @keyframes pulse-green { 0%,100% { box-shadow: 0 0 0 0 rgba(74,222,128,.6); } 50% { box-shadow: 0 0 0 6px rgba(74,222,128,0); } }
    @keyframes pulse-red   { 0%,100% { box-shadow: 0 0 0 0 rgba(251,146,60,.6); } 50% { box-shadow: 0 0 0 6px rgba(251,146,60,0); } }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(270px, 1fr)); gap: 1.2rem; max-width: 1000px; margin: 0 auto; }
    .card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 14px; padding: 1.4rem 1.6rem; display: flex; flex-direction: column; gap: 1rem; transition: border-color .3s, box-shadow .3s; }
    .card.up   { border-color: #14532d; box-shadow: 0 0 0 1px #14532d inset; }
    .card.down { border-color: #7f1d1d; box-shadow: 0 0 0 1px #7f1d1d inset; }
    .card-top { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .service-info { min-width: 0; }
    .service-name { font-size: 1.05rem; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .service-url  { font-size: 0.73rem; color: #4b5563; margin-top: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.3rem 0.75rem; border-radius: 999px; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
    .badge.up       { background: #052e16; color: #4ade80; }
    .badge.down     { background: #450a0a; color: #f87171; }
    .badge.checking { background: #1e293b; color: #94a3b8; }
    .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .badge.up .badge-dot { animation: pulse-green 2s infinite; }
    .card-meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.76rem; color: #4b5563; border-top: 1px solid #2a2d3a; padding-top: 0.75rem; }
    .http-code span { color: #94a3b8; font-weight: 600; }
    .controls { text-align: center; margin: 2rem auto 0; }
    .refresh-btn { background: #1a1d27; border: 1px solid #2a2d3a; color: #94a3b8; padding: 0.6rem 1.4rem; border-radius: 8px; font-size: 0.88rem; cursor: pointer; transition: background .2s, color .2s; }
    .refresh-btn:hover    { background: #22263a; color: #fff; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .next-check { font-size: 0.8rem; color: #374151; margin-top: 0.6rem; }
    .powered-by { text-align: center; margin-top: 3rem; font-size: 0.75rem; color: #374151; }
    .powered-by a { color: #4b5563; text-decoration: none; }
    .powered-by a:hover { color: #9ca3af; }
    .spinner { display: inline-block; width: 10px; height: 10px; border: 2px solid #4b5563; border-top-color: #94a3b8; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>Status Dashboard</h1>
    <p>Live status of key applications</p>
    <div class="overall-status checking" id="overall">
      <span class="dot"></span>
      <span id="overall-text">Checking...</span>
    </div>
  </header>
  <div class="grid" id="grid"></div>
  <div class="controls">
    <button class="refresh-btn" id="refresh-btn" onclick="runChecks()">&#8635; Refresh now</button>
    <div class="next-check" id="next-check"></div>
  </div>
  <div class="powered-by">Status checks run directly in your browser</div>
  <script>
    var SERVICES = [
      { name: 'AFAS',          url: 'https://www.afas.nl' },
      { name: 'Somtoday',      url: 'https://inloggen.somtoday.nl' },
      { name: 'Presentis',     url: 'https://www.presentis.nl' },
      { name: 'De Meerwaarde', url: 'https://www.demeerwaarde.nl' },
      { name: 'Microsoft',     url: 'https://www.microsoft.com' },
      { name: 'Cloudflare',    url: 'https://www.cloudflare.com' }
    ];
    var TIMEOUT_MS  = 8000;
    var REFRESH_SEC = 60;
    var states = SERVICES.map(function() { return { status: 'checking', code: null, checkedAt: null }; });
    var countdown = REFRESH_SEC;
    var countdownTimer;

    var grid = document.getElementById('grid');
    SERVICES.forEach(function(s, i) {
      var card = document.createElement('div');
      card.className = 'card';
      card.id = 'card-' + i;

      var cardTop = document.createElement('div');
      cardTop.className = 'card-top';

      var svcInfo = document.createElement('div');
      svcInfo.className = 'service-info';

      var svcName = document.createElement('div');
      svcName.className = 'service-name';
      svcName.textContent = s.name;

      var svcUrl = document.createElement('div');
      svcUrl.className = 'service-url';
      svcUrl.textContent = s.url.replace('https://', '');

      svcInfo.appendChild(svcName);
      svcInfo.appendChild(svcUrl);

      var badge = document.createElement('div');
      badge.className = 'badge checking';
      badge.id = 'badge-' + i;

      var spinner = document.createElement('span');
      spinner.className = 'spinner';
      badge.appendChild(spinner);
      badge.appendChild(document.createTextNode(' Checking'));

      cardTop.appendChild(svcInfo);
      cardTop.appendChild(badge);

      var cardMeta = document.createElement('div');
      cardMeta.className = 'card-meta';

      var checkedSpan = document.createElement('span');
      checkedSpan.id = 'checked-' + i;
      checkedSpan.textContent = '-';

      var codeSpan = document.createElement('span');
      codeSpan.className = 'http-code';
      codeSpan.id = 'code-' + i;

      cardMeta.appendChild(checkedSpan);
      cardMeta.appendChild(codeSpan);

      card.appendChild(cardTop);
      card.appendChild(cardMeta);
      grid.appendChild(card);
    });

    function checkService(url) {
      return new Promise(function(resolve) {
        var controller = new AbortController();
        var timer = setTimeout(function() { controller.abort(); }, TIMEOUT_MS);
        fetch(url, { mode: 'no-cors', signal: controller.signal })
          .then(function() {
            clearTimeout(timer);
            resolve({ up: true, code: null });
          })
          .catch(function() {
            clearTimeout(timer);
            resolve({ up: false, code: null });
          });
      });
    }

    function updateCard(i, status, code, checkedAt) {
      var card      = document.getElementById('card-' + i);
      var badge     = document.getElementById('badge-' + i);
      var codeEl    = document.getElementById('code-' + i);
      var checkedEl = document.getElementById('checked-' + i);

      card.className  = 'card ' + status;
      badge.className = 'badge ' + status;

      while (badge.firstChild) { badge.removeChild(badge.firstChild); }
      var dot = document.createElement('span');
      dot.className = 'badge-dot';
      badge.appendChild(dot);
      badge.appendChild(document.createTextNode(' ' + (status === 'up' ? 'Up' : 'Down')));

      codeEl.textContent = '';
      if (code && code > 0) {
        codeEl.textContent = 'HTTP ';
        var codeInner = document.createElement('span');
        codeInner.textContent = code;
        codeEl.appendChild(codeInner);
      }

      checkedEl.textContent = checkedAt
        ? 'Checked ' + checkedAt.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
        : '-';
    }

    function updateOverall() {
      var overall = document.getElementById('overall');
      var text    = document.getElementById('overall-text');
      var allDone = states.every(function(s) { return s.status !== 'checking'; });
      var allUp   = states.every(function(s) { return s.status === 'up'; });
      var anyDown = states.some(function(s)  { return s.status === 'down'; });

      if (!allDone) {
        overall.className = 'overall-status checking';
        text.textContent  = 'Checking...';
      } else if (anyDown) {
        overall.className = 'overall-status some-down';
        var n = states.filter(function(s) { return s.status === 'down'; }).length;
        text.textContent  = n + ' service' + (n > 1 ? 's' : '') + ' down';
      } else if (allUp) {
        overall.className = 'overall-status all-up';
        text.textContent  = 'All systems operational';
      }
    }

    function runChecks() {
      clearInterval(countdownTimer);
      countdown = REFRESH_SEC;
      document.getElementById('refresh-btn').disabled = true;
      document.getElementById('next-check').textContent = '';

      states = SERVICES.map(function() { return { status: 'checking', code: null, checkedAt: null }; });
      SERVICES.forEach(function(s, i) {
        document.getElementById('card-' + i).className = 'card';
        var b = document.getElementById('badge-' + i);
        b.className = 'badge checking';
        while (b.firstChild) { b.removeChild(b.firstChild); }
        var sp = document.createElement('span');
        sp.className = 'spinner';
        b.appendChild(sp);
        b.appendChild(document.createTextNode(' Checking'));
        document.getElementById('code-' + i).textContent = '';
        document.getElementById('checked-' + i).textContent = '-';
      });
      updateOverall();

      var promises = SERVICES.map(function(s, i) {
        return checkService(s.url).then(function(result) {
          var now = new Date();
          states[i] = { status: result.up ? 'up' : 'down', code: result.code, checkedAt: now };
          updateCard(i, states[i].status, states[i].code, now);
          updateOverall();
        });
      });

      Promise.all(promises).then(function() {
        document.getElementById('refresh-btn').disabled = false;
        countdownTimer = setInterval(function() {
          countdown--;
          document.getElementById('next-check').textContent = 'Auto-refresh in ' + countdown + 's';
          if (countdown <= 0) { clearInterval(countdownTimer); runChecks(); }
        }, 1000);
      });
    }

    runChecks();
  </script>
</body>
</html>
