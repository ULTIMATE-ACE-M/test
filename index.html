<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ACE-M</title>
<style>
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;min-height:100vh;background:#f0ebe3;color:#1a0f05;overflow-x:hidden;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 48% at 12% 10%,rgba(255,110,20,.62) 0%,transparent 52%),radial-gradient(ellipse 55% 50% at 88% 20%,rgba(255,80,0,.55) 0%,transparent 50%),radial-gradient(ellipse 70% 55% at 50% 85%,rgba(255,130,40,.50) 0%,transparent 55%)}
nav{position:sticky;top:0;z-index:100;backdrop-filter:blur(44px) saturate(250%) brightness(1.08);-webkit-backdrop-filter:blur(44px) saturate(250%) brightness(1.08);background:rgba(255,255,255,.28);border-bottom:1.5px solid rgba(255,255,255,.72);box-shadow:0 0 0 1px rgba(0,0,0,.06),0 2px 16px rgba(0,0,0,.08)}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px;padding:0 2rem}
.nav-brand{font-size:1.15rem;font-weight:800;letter-spacing:-.5px;text-decoration:none;background:linear-gradient(135deg,#1a0f05 0%,#FF6B1A 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:.25rem}
.nav-link{font-size:.88rem;font-weight:500;text-decoration:none;color:rgba(26,15,5,.7);padding:.38rem .95rem;border-radius:20px;border:1.5px solid transparent;transition:all .22s ease;position:relative;overflow:hidden}
.nav-link::after{content:'';position:absolute;inset:0;background:linear-gradient(130deg,rgba(255,255,255,0) 20%,rgba(255,255,255,.55) 50%,rgba(255,255,255,0) 80%);transform:translateX(-160%);transition:transform .4s ease;pointer-events:none;border-radius:inherit}
.nav-link:hover{background:rgba(255,255,255,.45);color:#1a0f05;border-color:rgba(255,255,255,.88);box-shadow:0 0 0 1px rgba(255,255,255,.28),0 3px 10px rgba(0,0,0,.1),inset 0 2px 0 rgba(255,255,255,1)}
.nav-link:hover::after{transform:translateX(160%)}
.nav-link.active{background:linear-gradient(180deg,rgba(255,255,255,.8) 0%,rgba(255,255,255,.04) 44%,rgba(255,255,255,.18) 100%);color:#FF6B1A;font-weight:600;border-color:rgba(255,255,255,.92);box-shadow:0 0 0 1px rgba(255,255,255,.28),0 4px 18px rgba(0,0,0,.08),inset 0 2px 0 rgba(255,255,255,1)}
main{flex:1;position:relative;z-index:1}
footer{position:relative;z-index:1;border-top:1.5px solid rgba(255,255,255,.55);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}
.footer-inner{max-width:1100px;margin:0 auto;padding:2.5rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1.2rem}
.socials{display:flex;gap:.75rem}
.social-link{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;border-radius:13px;background:linear-gradient(180deg,rgba(255,255,255,.8) 0%,rgba(255,255,255,.04) 44%,rgba(255,255,255,.18) 100%);backdrop-filter:blur(40px) saturate(220%);-webkit-backdrop-filter:blur(40px) saturate(220%);color:rgba(26,15,5,.65);text-decoration:none;border:1.5px solid rgba(255,255,255,.92);border-bottom-color:rgba(255,255,255,.55);box-shadow:0 0 0 1px rgba(255,255,255,.28),0 4px 16px rgba(0,0,0,.1),inset 0 2px 0 rgba(255,255,255,1);transition:all .25s ease;position:relative;overflow:hidden}
.social-link::before{content:'';position:absolute;top:0;left:0;right:0;height:54%;background:linear-gradient(180deg,rgba(255,255,255,.82) 0%,rgba(255,255,255,0) 100%);pointer-events:none;border-radius:inherit}
.social-link::after{content:'';position:absolute;inset:0;background:linear-gradient(130deg,rgba(255,255,255,0) 20%,rgba(255,255,255,.65) 50%,rgba(255,255,255,0) 80%);transform:translateX(-160%);transition:transform .4s ease;pointer-events:none;border-radius:inherit}
.social-link:hover{color:#FF6B1A;transform:translateY(-3px);border-color:rgba(255,255,255,.96);box-shadow:0 0 0 1px rgba(255,255,255,.35),0 10px 28px rgba(255,107,26,.2),inset 0 2px 0 rgba(255,255,255,1)}
.social-link:hover::after{transform:translateX(160%)}
.social-link svg{width:20px;height:20px;position:relative;z-index:1}
.footer-note{font-size:.78rem;color:rgba(26,15,5,.38)}
</style>
</head>
